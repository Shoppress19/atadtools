<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .card { background: #252525; padding: 20px; border-radius: 15px; border: 2px solid #ff5722; max-width: 400px; margin: auto; }
        .video-link { display: block; position: relative; text-decoration: none; }

        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,87,34,0.9); color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; }
        .btn-blog { display: inline-block; margin-top: 20px; background: #ff5722; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>
    <h1>🛠️ ورشة بـريكـولاتي للصيانة</h1>

        <h3>🎥 فيديو شرح الصيانة</h3>
        <p>اضغط على الصورة لمشاهدة الفيديو</p>
        <a href="https://www.youtube.com/embed/Isc8qA63L-Q" target="_blank" class="video-link">
            <img src="https://img.youtube.com/vi/Isc8qA63L-Q/hqdefault.jpg">
            <div class="play-btn">▶ تشغيل الآن</div>

    <a href="blog.html" class="btn-blog">📑 الدخول للمدونة (المقالات)</a>

</html>
