<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بـريكـولاتي - صيانة الأدوات</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 0; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #111; border: 3px solid #ff5722; padding: 20px; border-radius: 25px; max-width: 380px; box-shadow: 0 0 20px rgba(255,87,34,0.4); }
        .video-wrapper { position: relative; cursor: pointer; display: inline-block; width: 100%; }
        .video-wrapper img { width: 100%; border-radius: 15px; border: 1px solid #333; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,87,34,0.9); color: white; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .btn { background: #ff5722; color: #fff; padding: 15px 30px; border-radius: 50px; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#ff5722; margin-top:0;">🛠️ ورشة بـريكـولاتي</h2>
        <p>اضغط على الصورة لمشاهدة شرح الصيانة</p>
        <a href="https://www.youtube.com/watch?v=Isc8qA63L-Q" target="_blank" class="video-wrapper">
            <img src="https://img.youtube.com/vi/Isc8qA63L-Q/maxresdefault.jpg" alt="صيانة الدريل">
            <div class="play-icon">▶</div>
        </a>
        <br>
        <a href="https://www.youtube.com/watch?v=Isc8qA63L-Q" target="_blank" class="btn">فتح الفيديو الآن</a>
    </div>
</body>
</html>
